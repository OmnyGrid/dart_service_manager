name: Dart CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - name: Dart version
        run: |
          dart --version
          uname -a
      - name: Install dependencies
        run: dart pub get
      - name: dart format
        run: dart format -o none --set-exit-if-changed .
      - name: dart analyze
        run: dart analyze --fatal-infos --fatal-warnings .
      - name: dependency_validator
        run: dart run dependency_validator
      - name: dart doc
        run: dart doc --dry-run
      - name: dart pub publish --dry-run
        run: dart pub publish --dry-run

  # The full suite runs on all three target platforms. Every driver test uses a
  # fake process runner, so the systemd/launchd/SCM logic is validated on each
  # OS without touching a real init system; the platform-tagged
  # (os-linux/os-macos/os-windows) tests remain skipped by default.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - name: Dart version
        run: dart --version
      - name: Install dependencies
        run: dart pub get
      - name: Run tests
        run: dart test --platform vm

  # Coverage is collected once, on Linux, and uploaded to Codecov.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - name: Install dependencies
        run: dart pub get
      - name: Run tests with coverage
        run: dart test --platform vm --coverage=./coverage
      - name: Generate coverage report
        run: |
          dart pub global activate coverage
          dart pub global run coverage:format_coverage --packages=.dart_tool/package_config.json --report-on=lib --lcov -o ./coverage/lcov.info -i ./coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          directory: ./coverage/
          flags: unittests
          env_vars: OS,DART
          fail_ci_if_error: false
          verbose: true
